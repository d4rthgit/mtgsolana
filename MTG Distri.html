<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTG Distri — A Pump.Fun Memecoin Bound to the Collector Crypt Vault</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=IM+Fell+English+SC&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0a0612;
      font-family: "Cormorant Garamond", Georgia, serif;
      color: #e8dcff;
      overflow: hidden;
    }
    #root { width: 100vw; height: 100vh; }
    * { box-sizing: border-box; }
  </style>

  <script
    src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script
    src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script
    src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="direction-codex.jsx"></script>
  <script type="text/babel" src="direction-vault.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "order": "codex-first",
      "show": "both"
    }/*EDITMODE-END*/;

    const ARTBOARD_W = 1440;
    const ARTBOARD_H = 4900;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      const codex = (
        <DCArtboard
          id="codex"
          label="A · The Illuminated Codex"
          width={ARTBOARD_W} height={ARTBOARD_H}
        >
          <DirectionCodex />
        </DCArtboard>
      );
      const arcane = (
        <DCArtboard
          id="vault"
          label="B · The Arcane Vault"
          width={ARTBOARD_W} height={ARTBOARD_H}
        >
          <DirectionVault />
        </DCArtboard>
      );

      let boards;
      if (t.show === "codex") boards = [codex];
      else if (t.show === "vault") boards = [arcane];
      else boards = t.order === "codex-first" ? [codex, arcane] : [arcane, codex];

      return (
        <>
          <DesignCanvas>
            <DCSection
              id="mtg-directions"
              title="MTG Distri — Pump.Fun ⨯ Collector Crypt"
              subtitle="Two directions for an MTG-distribution memecoin landing site. Click ⤢ on either to enter full-screen interactive mode."
            >
              {boards}
            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Composition" />
            <TweakRadio
              label="Direction order"
              value={t.order}
              options={["codex-first", "vault-first"]}
              onChange={(v) => setTweak("order", v)}
            />
            <TweakSelect
              label="Show"
              value={t.show}
              options={[
                { value: "both",  label: "Both directions" },
                { value: "codex", label: "Codex only" },
                { value: "vault", label: "Vault only" },
              ]}
              onChange={(v) => setTweak("show", v)}
            />
            <TweakSection label="Help" />
            <div style={{
              fontSize: 11, color: "rgba(41,38,27,.6)", lineHeight: 1.5,
              padding: "4px 0"
            }}>
              Drag artboards to reorder. Click <b>⤢</b> on an artboard to
              enter it fullscreen — that's the live interactive prototype.
              Press <b>Esc</b> to return to the canvas.
            </div>
          </TweaksPanel>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
